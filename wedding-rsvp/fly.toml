# fly.toml — Wedding RSVP deployment config
app = "karim-nada-wedding"     # change to your desired app name
primary_region = "jnb"        # Johannesburg is closest to Egypt on Fly.io
                               # Alternatively use "ams" (Amsterdam) or "cdg" (Paris)

[build]

[env]
  PORT = "3000"
  DB_PATH = "/data/rsvp.db"

[http_service]
  internal_port = 3000
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

# Persistent volume for SQLite database
[mounts]
  source      = "rsvp_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
